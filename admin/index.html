<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>管理後台｜青年領袖營</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body hidden>
  <div class="admin-layout">
    <aside class="sidebar">
      <a class="brand" href="./index.html" aria-label="青年領袖營管理後台首頁">
        <span class="brand-mark">YL</span>
        <span class="brand-copy">
          <strong>青年領袖營</strong>
          <small>ADMIN CONSOLE</small>
        </span>
      </a>

      <nav class="sidebar-nav" aria-label="後台選單">
        <a class="nav-item active" href="./index.html" aria-current="page">
          <span class="nav-icon" aria-hidden="true">◫</span>
          <span>Dashboard</span>
        </a>
        <button class="nav-item" type="button">
          <span class="nav-icon" aria-hidden="true">≡</span>
          <span>報名資料</span>
        </button>
        <button class="nav-item" type="button">
          <span class="nav-icon" aria-hidden="true">⚙</span>
          <span>設定</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item logout-item" id="logoutButton" type="button">
          <span class="nav-icon" aria-hidden="true">↪</span>
          <span>登出</span>
        </button>
        <p>2026 第五屆青年領袖營</p>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <p class="eyebrow">ADMIN CONSOLE</p>
          <h1>Dashboard</h1>
        </div>
        <div class="admin-profile" aria-label="目前登入身分">
          <span class="avatar" aria-hidden="true">A</span>
          <div>
            <strong>管理員</strong>
            <small>Administrator</small>
          </div>
        </div>
      </header>

      <section class="welcome-panel">
        <div>
          <p class="panel-label">WELCOME BACK</p>
          <h2>歡迎回到營會管理中心</h2>
          <p>之後可以從這裡管理報名資料與營會設定。目前後台資料功能尚未啟用。</p>
        </div>
        <div class="panel-graphic" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </section>

      <section class="workspace" aria-labelledby="workspaceTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">OVERVIEW</p>
            <h2 id="workspaceTitle">報名資料</h2>
          </div>
          <div class="table-tools">
            <label class="search-field">
              <span class="search-icon" aria-hidden="true">⌕</span>
              <span class="sr-only">搜尋報名資料</span>
              <input id="registrationSearch" type="search" placeholder="搜尋姓名、電話、教會" autocomplete="off">
            </label>
            <label class="filter-field">
              <span class="sr-only">依年齡篩選</span>
              <select id="ageFilter">
                <option value="all">全部年齡</option>
                <option value="adult">已成年</option>
                <option value="minor">未成年</option>
              </select>
            </label>
            <label class="filter-field">
              <span class="sr-only">依家長同意書上傳狀態篩選</span>
              <select id="consentFilter">
                <option value="all">全部同意書</option>
                <option value="uploaded">已上傳同意書</option>
                <option value="missing">未上傳同意書</option>
              </select>
            </label>
            <button class="export-button" id="exportExcel" type="button" disabled>
              匯出 Excel
            </button>
            <span class="status-badge" id="dataStatus">讀取中</span>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">姓名</th>
                <th scope="col">性別</th>
                <th scope="col">教會</th>
                <th scope="col">年齡</th>
                <th scope="col">報名日期</th>
                <th scope="col">家長同意書</th>
                <th scope="col">操作</th>
              </tr>
            </thead>
            <tbody id="registrationRows"></tbody>
          </table>
        </div>
        <p class="table-message" id="tableMessage" aria-live="polite">正在讀取報名資料…</p>
      </section>
    </main>
  </div>

  <dialog class="edit-dialog" id="editDialog">
    <form class="edit-form" id="editForm" method="dialog">
      <div class="dialog-heading">
        <div>
          <p class="eyebrow">EDIT REGISTRATION</p>
          <h2>編輯報名資料</h2>
        </div>
        <button class="dialog-close" id="closeEditDialog" type="button" aria-label="關閉編輯視窗">×</button>
      </div>
      <p class="privacy-note">基於隱私保護，身分證字號不會在此顯示或修改。</p>
      <input id="editDocumentId" type="hidden">
      <div class="edit-grid">
        <label><span>報名營隊</span><select id="editCamp" required><option value="青年領袖營">青年領袖營</option><option value="暑期兒童營">暑期兒童營</option></select></label>
        <label><span>姓名</span><input id="editName" type="text" required></label>
        <label><span>性別</span><select id="editGender" required><option value="男">男</option><option value="女">女</option><option value="保留">保留</option></select></label>
        <label><span>出生年月日</span><input id="editBirthDate" type="date" required></label>
        <label class="full"><span>住址</span><input id="editAddress" type="text" required></label>
        <label><span>電話</span><input id="editPhone" type="tel" required></label>
        <label><span>電子信箱</span><input id="editEmail" type="email" required></label>
        <label class="full"><span>教會名稱</span><input id="editChurch" type="text" required></label>
        <label><span>接送需求</span><input id="editTransport" type="text" required></label>
        <label><span>飲食需求</span><input id="editDiet" type="text" required></label>
        <label><span>衣服尺寸</span><select id="editShirtSize" required><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>2XL</option><option>3XL</option></select></label>
      </div>
      <p class="edit-message" id="editMessage" role="alert" aria-live="polite"></p>
      <div class="dialog-actions">
        <button class="cancel-button" id="cancelEdit" type="button">取消</button>
        <button class="save-button" id="saveEdit" type="submit">儲存變更</button>
      </div>
    </form>
  </dialog>
  <script type="module" src="./admin.js"></script>
</body>
</html>
