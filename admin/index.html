<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>管理後台｜Kilaing tjai Yisu</title>
  <link rel="stylesheet" href="./admin.css?v=20260705-13">
</head>
<body hidden>
  <div class="admin-layout">
    <aside class="sidebar">
      <a class="brand" href="./index.html" aria-label="Kilaing tjai Yisu後台首頁">
        <span class="brand-mark">KTY</span>
        <span class="brand-copy">
          <strong>Kilaing tjai Yisu</strong>
          <small>ADMIN CONSOLE</small>
        </span>
      </a>

      <nav class="sidebar-nav" aria-label="後台選單">
        <a class="nav-item active" id="dashboardNav" href="./index.html" aria-current="page">
          <span class="nav-icon" aria-hidden="true">◫</span>
          <span>分析圖表</span>
        </a>
        <button class="nav-item" id="registrationNav" type="button">
          <span class="nav-icon" aria-hidden="true">≡</span>
          <span>報名資料</span>
        </button>
        <button class="nav-item" type="button">
          <span class="nav-icon" aria-hidden="true">⚙</span>
          <span>設定</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item logout-item" id="logoutButton" type="button">
          <span class="nav-icon" aria-hidden="true">↪</span>
          <span>登出</span>
        </button>
        <p>Kilaing tjai Yisu</p>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>分析圖表</h1>
        </div>
        <div class="admin-profile" aria-label="目前登入身分">
          <span class="avatar" aria-hidden="true">A</span>
          <div>
            <strong>管理員</strong>
            <small>Administrator</small>
          </div>
        </div>
      </header>

      <svg class="svg-symbols" aria-hidden="true">
        <symbol id="icon-users" viewBox="0 0 24 24">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </symbol>
        <symbol id="icon-cap" viewBox="0 0 24 24">
          <path d="m2 10 10-5 10 5-10 5L2 10Z"/><path d="M6 12.5V17c3.5 2.7 8.5 2.7 12 0v-4.5M22 10v6"/>
        </symbol>
        <symbol id="icon-heart" viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78Z"/>
        </symbol>
        <symbol id="icon-bus" viewBox="0 0 24 24">
          <path d="M8 6v6m8-6v6M6 17h12M5 3h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/><path d="M7 19v2m10-2v2M3 12h18"/>
        </symbol>
        <symbol id="icon-utensils" viewBox="0 0 24 24">
          <path d="M7 3v8m-3-8v5a3 3 0 0 0 6 0V3M7 11v10M16 3v18M16 3c3 2 4 5 4 8h-4"/>
        </symbol>
        <symbol id="icon-shirt" viewBox="0 0 24 24">
          <path d="m16 3 5 3-2 5-3-1v11H8V10l-3 1-2-5 5-3a4 4 0 0 0 8 0Z"/>
        </symbol>
      </svg>

      <section class="statistics-dashboard" aria-labelledby="statisticsTitle">
        <div class="statistics-heading">
          <div>
            <p class="eyebrow">REGISTRATION INSIGHTS</p>
            <h2 id="statisticsTitle">報名狀況總覽</h2>
          </div>
          <p>點選卡片查看分析或快速篩選名單</p>
        </div>

        <section class="statistics-group" aria-labelledby="youthManagementTitle">
          <h3 id="youthManagementTitle">青年營管理</h3>
          <div class="statistics-grid">
            <button class="stat-card is-loading" type="button" data-action="analysis" data-analysis="population" data-camp="青年領袖營" aria-pressed="false">
              <span class="stat-icon stat-icon--teal"><svg><use href="#icon-cap"></use></svg></span>
              <span class="stat-copy"><span class="stat-label">青年營人數</span><strong class="stat-value" data-stat="youthCount">0</strong><small>點擊查看性別與年齡統計</small></span>
              <span class="stat-arrow" aria-hidden="true">⌄</span>
            </button>
            <button class="stat-card is-loading" type="button" data-action="transport" data-dashboard-filter="youthTransport" aria-pressed="false">
              <span class="stat-icon stat-icon--blue"><svg><use href="#icon-bus"></use></svg></span>
              <span class="stat-copy"><span class="stat-label">接送需求</span><strong class="stat-value" data-stat="youthTransport">0</strong><small>點擊查看需接送名單</small></span>
              <span class="stat-arrow" aria-hidden="true">→</span>
            </button>
            <button class="stat-card stat-card--mini is-loading" type="button" data-action="analysis" data-analysis="diet" data-camp="青年領袖營" aria-pressed="false">
              <span class="stat-icon stat-icon--amber"><svg><use href="#icon-utensils"></use></svg></span>
              <span class="stat-copy"><span class="stat-label">飲食需求</span><span class="mini-analytics" data-mini-diet="youth"></span></span>
              <span class="stat-arrow" aria-hidden="true">⌄</span>
            </button>
            <button class="stat-card stat-card--mini stat-card--shirt is-loading" type="button" data-action="analysis" data-analysis="shirt" data-camp="青年領袖營" aria-pressed="false">
              <span class="stat-icon stat-icon--purple"><svg><use href="#icon-shirt"></use></svg></span>
              <span class="stat-copy"><span class="card-header"><span class="stat-label">衣服尺寸</span><span class="view-all-link" data-view-all="youth">查看 →</span></span><span class="mini-analytics" data-mini-shirt="youth"></span><span class="size-dots" aria-hidden="true"><i></i><i></i><i></i></span></span>
            </button>
          </div>
        </section>

        <section class="statistics-group" aria-labelledby="childManagementTitle">
          <h3 id="childManagementTitle">兒童營管理</h3>
          <div class="statistics-grid">
            <button class="stat-card is-loading" type="button" data-action="analysis" data-analysis="population" data-camp="暑期兒童營" aria-pressed="false">
              <span class="stat-icon stat-icon--coral"><svg><use href="#icon-heart"></use></svg></span>
              <span class="stat-copy"><span class="stat-label">兒童營人數</span><strong class="stat-value" data-stat="childCount">0</strong><small>點擊查看性別與年齡統計</small></span>
              <span class="stat-arrow" aria-hidden="true">⌄</span>
            </button>
            <button class="stat-card is-loading" type="button" data-action="transport" data-dashboard-filter="childTransport" aria-pressed="false">
              <span class="stat-icon stat-icon--blue"><svg><use href="#icon-bus"></use></svg></span>
              <span class="stat-copy"><span class="stat-label">接送需求</span><strong class="stat-value" data-stat="childTransport">0</strong><small>點擊查看需接送名單</small></span>
              <span class="stat-arrow" aria-hidden="true">→</span>
            </button>
            <button class="stat-card stat-card--mini is-loading" type="button" data-action="analysis" data-analysis="diet" data-camp="暑期兒童營" aria-pressed="false">
              <span class="stat-icon stat-icon--amber"><svg><use href="#icon-utensils"></use></svg></span>
              <span class="stat-copy"><span class="stat-label">飲食需求</span><span class="mini-analytics" data-mini-diet="child"></span></span>
              <span class="stat-arrow" aria-hidden="true">⌄</span>
            </button>
            <button class="stat-card stat-card--mini stat-card--shirt is-loading" type="button" data-action="analysis" data-analysis="shirt" data-camp="暑期兒童營" aria-pressed="false">
              <span class="stat-icon stat-icon--purple"><svg><use href="#icon-shirt"></use></svg></span>
              <span class="stat-copy"><span class="card-header"><span class="stat-label">衣服尺寸</span><span class="view-all-link" data-view-all="child">查看 →</span></span><span class="mini-analytics" data-mini-shirt="child"></span><span class="size-dots" aria-hidden="true"><i></i><i></i><i></i></span></span>
            </button>
          </div>
        </section>

        <div class="analysis-panel" id="analysisPanel" hidden>
          <div class="analysis-panel-heading">
            <div class="analysis-title-wrap">
              <span class="analysis-icon" aria-hidden="true"><svg><use id="analysisIconUse" href="#icon-users"></use></svg></span>
              <div><p class="eyebrow">CAMP ANALYSIS</p><h3 id="analysisPanelTitle"></h3></div>
            </div>
            <button type="button" id="closeAnalysisPanel" aria-label="收合分析面板">×</button>
          </div>
          <div class="analysis-content" id="analysisContent"></div>
        </div>
      </section>

      <section class="workspace" id="registrationWorkspace" aria-labelledby="workspaceTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">OVERVIEW</p>
            <h2 id="workspaceTitle">報名資料</h2>
          </div>
          <div class="table-tools">
            <label class="search-field">
              <span class="search-icon" aria-hidden="true">⌕</span>
              <span class="sr-only">搜尋報名資料</span>
              <input id="registrationSearch" type="search" placeholder="搜尋姓名、電話、教會" autocomplete="off">
            </label>
            <label class="filter-field">
              <span class="sr-only">依年齡篩選</span>
              <select id="ageFilter">
                <option value="all">全部年齡</option>
                <option value="adult">已成年</option>
                <option value="minor">未成年</option>
              </select>
            </label>
            <label class="filter-field">
              <span class="sr-only">依家長同意書上傳狀態篩選</span>
              <select id="consentFilter">
                <option value="all">全部同意書</option>
                <option value="uploaded">已上傳同意書</option>
                <option value="missing">未上傳同意書</option>
              </select>
            </label>
            <button class="export-button" id="exportExcel" type="button" disabled>
              匯出 Excel
            </button>
            <span class="status-badge" id="dataStatus">讀取中</span>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="sequence-column" scope="col">序號</th>
                <th scope="col">姓名</th>
                <th scope="col">報名營隊</th>
                <th scope="col">性別</th>
                <th scope="col">教會</th>
                <th scope="col">年齡</th>
                <th scope="col">報名日期</th>
                <th scope="col">家長同意書</th>
                <th scope="col">操作</th>
              </tr>
            </thead>
            <tbody id="registrationRows"></tbody>
          </table>
        </div>
        <nav class="table-pagination" id="tablePagination" aria-label="報名資料分頁" hidden>
          <button id="previousPage" type="button">上一頁</button>
          <span id="pageIndicator" aria-live="polite">1 / 1</span>
          <button id="nextPage" type="button">下一頁</button>
        </nav>
        <p class="table-message" id="tableMessage" aria-live="polite">正在讀取報名資料…</p>
      </section>
    </main>
  </div>

  <dialog class="edit-dialog" id="editDialog">
    <form class="edit-form" id="editForm" method="dialog">
      <div class="dialog-heading">
        <div>
          <p class="eyebrow">EDIT REGISTRATION</p>
          <h2>編輯報名資料</h2>
        </div>
        <button class="dialog-close" id="closeEditDialog" type="button" aria-label="關閉編輯視窗">×</button>
      </div>
      <p class="privacy-note">基於隱私保護，身分證字號不會在此顯示或修改。</p>
      <input id="editDocumentId" type="hidden">
      <div class="edit-grid">
        <label><span>報名營隊</span><select id="editCamp" required><option value="青年領袖營">青年領袖營</option><option value="暑期兒童營">暑期兒童營</option></select></label>
        <label><span>姓名</span><input id="editName" type="text" required></label>
        <label><span>性別</span><select id="editGender" required><option value="男">男</option><option value="女">女</option><option value="保留">保留</option></select></label>
        <label><span>出生年月日</span><input id="editBirthDate" type="date" required></label>
        <label class="full"><span>住址</span><input id="editAddress" type="text" required></label>
        <label><span>電話</span><input id="editPhone" type="tel" required></label>
        <label><span>電子信箱</span><input id="editEmail" type="email" required></label>
        <label class="full"><span>教會名稱</span><input id="editChurch" type="text" required></label>
        <label><span>接送需求</span><input id="editTransport" type="text" required></label>
        <label><span>飲食需求</span><input id="editDiet" type="text" required></label>
        <label><span>衣服尺寸</span><select id="editShirtSize" required><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>2XL</option><option>3XL</option></select></label>
      </div>
      <p class="edit-message" id="editMessage" role="alert" aria-live="polite"></p>
      <div class="dialog-actions">
        <button class="cancel-button" id="cancelEdit" type="button">取消</button>
        <button class="save-button" id="saveEdit" type="submit">儲存變更</button>
      </div>
    </form>
  </dialog>
  <script type="module" src="./admin.js?v=20260705-13"></script>
</body>
</html>
